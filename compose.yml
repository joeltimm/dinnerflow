x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Database ───────────────────────────────────────────────────────────────
  dinner-db:
    image: pgvector/pgvector:pg15
    container_name: dinner-db
    logging: *default-logging
    environment:
      - POSTGRES_DB=${DINNER_DB_NAME}
      - POSTGRES_USER=${DINNER_DB_USER}
      - POSTGRES_PASSWORD=${DINNER_DB_PASSWORD}
    volumes:
      - dinner_postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DINNER_DB_USER} -d ${DINNER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5436:5432"

  # ── Redis (Celery broker + result backend) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ironskillet_redis
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: ironskillet_backend
    logging: *default-logging
    restart: unless-stopped
    environment:
      - DINNER_DB_NAME=${DINNER_DB_NAME}
      - DINNER_DB_USER=${DINNER_DB_USER}
      - DINNER_DB_PASSWORD=${DINNER_DB_PASSWORD}
      - DINNER_DB_HOST=dinner-db
      - DINNER_DB_PORT=5432
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://100.98.99.49:8081/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - GOOGLE_AUTH_PATH=/app/google_auth
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - UPLOADS_PATH=/app/uploads
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Recipe image uploads — persisted on host
      - /home/joel/iron-skillet/uploads:/app/uploads
      # Gmail OAuth token — reuse the existing token from calendar_bot.
      # token_joeltimm.json already includes gmail.send scope.
      # Mounted read-only so the backend can load and auto-refresh it.
      - /home/joel/my_super_secure_secrets/google_auth:/app/google_auth
    # Port 8000 on the host is taken by gohttpserver.
    # nginx (web container) reaches the backend over the internal app-net network,
    # so no host-port binding is needed for normal operation.
    # Expose on 8010 only if you need direct API access for debugging.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "127.0.0.1:8010:8000"
    networks:
      - app-net
    depends_on:
      dinner-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker (background tasks: emails, LLM, meal plans) ─────────────
  celery-worker:
    build: ./backend
    container_name: ironskillet_worker
    logging: *default-logging
    restart: unless-stopped
    command: ["celery", "-A", "celery_app", "worker",
              "--loglevel=info", "--concurrency=8"]
    environment:
      - DINNER_DB_NAME=${DINNER_DB_NAME}
      - DINNER_DB_USER=${DINNER_DB_USER}
      - DINNER_DB_PASSWORD=${DINNER_DB_PASSWORD}
      - DINNER_DB_HOST=dinner-db
      - DINNER_DB_PORT=5432
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://100.98.99.49:8081/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - GOOGLE_AUTH_PATH=/app/google_auth
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - UPLOADS_PATH=/app/uploads
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - /home/joel/iron-skillet/uploads:/app/uploads
      - /home/joel/my_super_secure_secrets/google_auth:/app/google_auth
    networks:
      - app-net
    depends_on:
      dinner-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (cron scheduler — single instance only) ───────────────────
  celery-beat:
    build: ./backend
    container_name: ironskillet_beat
    logging: *default-logging
    restart: unless-stopped
    command: ["celery", "-A", "celery_app", "beat",
              "--loglevel=info"]
    environment:
      - DINNER_DB_NAME=${DINNER_DB_NAME}
      - DINNER_DB_USER=${DINNER_DB_USER}
      - DINNER_DB_PASSWORD=${DINNER_DB_PASSWORD}
      - DINNER_DB_HOST=dinner-db
      - DINNER_DB_PORT=5432
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy

  # ── React frontend (nginx) ─────────────────────────────────────────────────
  web:
    build: ./web
    container_name: ironskillet_web
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Legacy Streamlit apps (kept for reference / rollback) ─────────────────
  # Uncomment to run alongside the new stack on different ports.
  #
  # frontend-legacy:
  #   build: ./frontend
  #   container_name: dinnerflow_ui_legacy
  #   ports: ["8501:8501"]
  #   ...
  #
  # ironskillet-legacy:
  #   build: ./ironskillet
  #   container_name: ironskillet_legacy
  #   ports: ["8502:8502"]
  #   ...

networks:
  app-net:
    # Internal network shared by dinner-db, backend, and web (nginx)
    name: ironskillet-app-net

volumes:
  redis_data:
  dinner_postgres_data:
    # Production database volume — kept external so that `docker compose down -v`
    # cannot accidentally destroy recipe data.
    # If starting fresh: docker volume create dinnerflow_postgres_data
    external: true
    name: dinnerflow_postgres_data
